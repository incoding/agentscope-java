server:
  port: 8080

logging:
  level:
    root: INFO
    io.agentscope: INFO

agentscope:
  # Choose model provider - here we use OpenAI-compatible Kimi as an example.
  model:
    provider: openai

  openai:
    enabled: true
    api-key: ${MOONSHOT_API_KEY:YOUR_MOONSHOT_API_KEY_HERE}
    model-name: kimi-k2.5
    base-url: https://api.moonshot.cn/v1
    stream: true

  agent:
    enabled: true
    name: "ChatCompletionsAgent"
    sys-prompt: |
      You are a helpful assistant built with AgentScope Java.
      Answer in Chinese when the user speaks Chinese, otherwise answer in English.
    max-iters: 8

  chat-completions:
    enabled: true
    base-path: /v1/chat/completions
